name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        run: |
          # Pin to match the version developers run locally (avoids SC drift).
          VER=v0.11.0
          curl -fsSL "https://github.com/koalaman/shellcheck/releases/download/$VER/shellcheck-$VER.linux.x86_64.tar.xz" | tar -xJ
          "shellcheck-$VER/shellcheck" --version
          "shellcheck-$VER/shellcheck" bin/shtf install.sh

      - name: bats smoke tests
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats
          bats test/smoke.bats
